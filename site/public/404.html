<!doctype html>
<!-- GitHub Pages SPA fallback (spa-github-pages): Pages serves this for any
     unknown path; it re-encodes the path into a query string and redirects to
     index.html, which decodes it back before the router mounts.
     pathSegmentsToKeep = 1 for a project page (/lumen-metrics/...);
     set to 0 if this ever moves to a custom domain. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lumen Metrics</title>
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
