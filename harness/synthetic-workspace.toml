# Dropped into a lumen worktree by the backfill when the checked-out commit
# predates lumen's extraction from its parent monorepo (those commits reference
# workspace keys but the workspace root Cargo.toml lived outside the extracted
# paths). Values mirror lumen's present-day workspace root so the release
# profile — and therefore bench numbers — stay comparable across nights.
[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT"

[workspace.lints.clippy]
type_complexity = "allow"
too_many_arguments = "allow"
doc_lazy_continuation = "allow"
needless_range_loop = "allow"

[profile.release]
opt-level = 3
lto = "thin"
